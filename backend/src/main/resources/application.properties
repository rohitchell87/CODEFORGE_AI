# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/codeforge_ai?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=rohit123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=DEBUG
logging.level.com.codeforge.ai=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret=your_super_secret_key_change_in_production_at_least_32_characters_long_for_security
jwt.expiration=86400000

# Application Configuration
app.name=CodeForge AI
app.version=1.0.0

# AI Integration
ai.provider=gemini
ai.api-key=AQ.Ab8RN6J4jHsPAzDQ9Ry1p2D07Aa8BvDMK3N_Eg-1zkiKpuwL-g
ai.model=gemini-2.5-flash

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Judge0 Integration
# Use this exact configuration for RapidAPI Judge0:
# judge0.url=https://judge0-ce.p.rapidapi.com
# judge0.apiHost=judge0-ce.p.rapidapi.com
# judge0.apiKey=YOUR_REAL_RAPIDAPI_KEY
# judge0.baseUrl=https://judge0-ce.p.rapidapi.com

# If you are using the public Judge0 CE server instead, use:
judge0.url=https://ce.judge0.com
# judge0.apiHost=
# judge0.apiKey=
# judge0.baseUrl=https://ce.judge0.com

# Enable mock mode to bypass Judge0 and validate frontend/backend connectivity
app.mock-mode=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
